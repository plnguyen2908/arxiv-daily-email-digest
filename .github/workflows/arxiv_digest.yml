name: arXiv Digest

on:
  workflow_dispatch:

jobs:
  run-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "No requirements.txt found; skipping dependency install."
          fi

      - name: Run digest
        env:
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_TIMEOUT_SECONDS: ${{ secrets.SMTP_TIMEOUT_SECONDS }}
          SMTP_RETRIES: ${{ secrets.SMTP_RETRIES }}
          SMTP_STARTTLS: ${{ secrets.SMTP_STARTTLS }}
          SMTP_USE_SSL: ${{ secrets.SMTP_USE_SSL }}
          SMTP_FALLBACK_SSL: ${{ secrets.SMTP_FALLBACK_SSL }}
          ARXIV_USER_AGENT: ${{ secrets.ARXIV_USER_AGENT }}
        run: |
          if [ -f main.py ]; then
            python main.py run
          else
            echo "main.py not found. Add app code before enabling schedule in production."
          fi
