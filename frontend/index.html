<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>arXiv Interactive Digest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-orb bg-orb-a"></div>
    <div class="bg-orb bg-orb-b"></div>

    <main class="page">
      <header class="hero">
        <p class="eyebrow">Interactive Tracker</p>
        <h1>arXiv Daily Reading Board</h1>
        <p class="subtitle">
          Fetch by date, review papers block-by-block, and tick each paper as finished.
        </p>
      </header>

      <section class="panel controls">
        <div class="control-row">
          <label for="datePicker">Date</label>
          <input id="datePicker" type="date" />
          <button id="fetchToday" class="btn">Fetch Today</button>
          <button id="fetchDate" class="btn">Fetch Selected Date</button>
          <button id="loadDate" class="btn ghost">Load Selected Date</button>
        </div>

        <p id="statusText" class="status">Ready.</p>

        <div class="health-grid">
          <div class="health-card">
            <p class="health-label">Digest Cache</p>
            <p id="healthDataUsed" class="health-value">-</p>
          </div>
          <div class="health-card">
            <p class="health-label">Cache Limit</p>
            <p id="healthDataLimit" class="health-value">-</p>
          </div>
          <div class="health-card">
            <p class="health-label">Disk Used</p>
            <p id="healthDiskUsed" class="health-value">-</p>
          </div>
          <div class="health-card">
            <p class="health-label">Disk Free</p>
            <p id="healthDiskFree" class="health-value">-</p>
          </div>
          <div class="health-card">
            <p class="health-label">Disk Total</p>
            <p id="healthDiskTotal" class="health-value">-</p>
          </div>
          <div class="health-card">
            <p class="health-label">Disk Usage %</p>
            <p id="healthDiskPercent" class="health-value">-</p>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Keyword List</h2>
        </div>
        <div class="topic-create">
          <input id="newTopicKey" type="text" placeholder="Big topic key (e.g., world_model)" />
          <input id="newTopicLabel" type="text" placeholder="Big topic label (e.g., World Model)" />
          <input id="newTopicKeyword" type="text" placeholder="First sub-keyword" />
          <button id="addTopicBtn" class="btn">Add Big Topic</button>
        </div>
        <div id="topicsEditor" class="topics-editor"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Digest</h2>
          <p id="progressText" class="progress"></p>
        </div>
        <div id="digestTabs" class="digest-tabs"></div>
        <div id="digestContainer" class="digest-grid"></div>
      </section>
    </main>

    <template id="topicEditorTemplate">
      <article class="topic-edit-card">
        <h3 class="topic-title"></h3>
        <p class="topic-meta"></p>
        <div class="keyword-chip-list"></div>
        <div class="subkeyword-row">
          <input class="subkeyword-input" type="text" placeholder="New sub-keyword" />
          <input class="subkeyword-password" type="password" placeholder="Password to unlock" />
          <button class="btn add-subkeyword-btn" type="button">Add Sub-keyword</button>
        </div>
      </article>
    </template>

    <template id="topicBlockTemplate">
      <article class="topic-block">
        <h3 class="topic-heading"></h3>
        <div class="paper-list"></div>
      </article>
    </template>

    <template id="paperCardTemplate">
      <article class="paper-card">
        <label class="paper-check-row">
          <input class="paper-check" type="checkbox" />
          <span>Finished</span>
        </label>
        <a class="paper-title" target="_blank" rel="noopener noreferrer"></a>
        <details>
          <summary>Abstract</summary>
          <p class="paper-abstract"></p>
        </details>
        <div class="paper-meta"></div>
      </article>
    </template>

    <script src="./app.js" defer></script>
  </body>
</html>
